version: '3.8'

services:
  postgres:
    image: postgres:18-alpine
    container_name: pod-game-backend-postgres
    environment:
      POSTGRES_USER: podgame
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: podgame_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U podgame -d podgame_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
