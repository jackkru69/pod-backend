version: "3.8"

# Docker Compose test environment (T109)
# Isolated testing environment with PostgreSQL and mock TON Center

services:
  # PostgreSQL test database
  postgres-test:
    image: postgres:15-alpine
    container_name: pod-test-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pod_game_test
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5433:5432" # Different port to avoid conflicts
    volumes:
      - postgres-test-data:/var/lib/postgresql/data
      - ../../migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pod_game_test"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - test-network

  # Mock TON Center API server
  mock-toncenter:
    build:
      context: ./mock-toncenter
      dockerfile: Dockerfile
    container_name: pod-mock-toncenter
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - LOG_LEVEL=debug
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - test-network

  # Game backend service for integration tests
  game-backend-test:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: pod-backend-test
    depends_on:
      postgres-test:
        condition: service_healthy
      mock-toncenter:
        condition: service_healthy
    environment:
      # Application
      APP_NAME: "Game Backend Test"
      APP_VERSION: "test"

      # HTTP Server
      HTTP_PORT: "3000"

      # Database
      PG_URL: "postgresql://postgres:postgres@postgres-test:5432/pod_game_test?sslmode=disable"
      PG_POOL_MAX: "5"

      # Logging
      LOG_LEVEL: "debug"

      # TON Blockchain (mock)
      TON_CENTER_V2_URL: "http://mock-toncenter:8082/api/v2"
      TON_GAME_CONTRACT_ADDRESS: "0:test_contract_address"

      # Circuit Breaker
      CIRCUIT_BREAKER_MAX_FAILURES: "5"
      CIRCUIT_BREAKER_TIMEOUT: "60s"

      # CORS
      CORS_ALLOWED_ORIGINS: "http://localhost:3001"

      # Stub values for unused features
      GRPC_PORT: "50051"
      RMQ_RPC_SERVER: "test"
      RMQ_RPC_CLIENT: "test"
      RMQ_URL: "amqp://guest:guest@localhost:5672/"
      NATS_RPC_SERVER: "test"
      NATS_URL: "nats://localhost:4222"
    ports:
      - "3001:3000"
    networks:
      - test-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres-test-data:
    driver: local

networks:
  test-network:
    driver: bridge
