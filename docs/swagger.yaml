basePath: /
definitions:
  entity.ActionClaim:
    properties:
      claim_type:
        $ref: '#/definitions/entity.ActionClaimType'
      created_at:
        type: string
      expires_at:
        type: string
      game_id:
        type: integer
      holder_wallet:
        type: string
      release_reason:
        type: string
      status:
        $ref: '#/definitions/entity.ActionClaimStatus'
    type: object
  entity.ActionClaimStatus:
    enum:
    - active
    - released
    - expired
    type: string
    x-enum-varnames:
    - ActionClaimStatusActive
    - ActionClaimStatusReleased
    - ActionClaimStatusExpired
  entity.ActionClaimType:
    enum:
    - join
    - cancel
    - reveal
    - expired_follow_up
    type: string
    x-enum-varnames:
    - ActionClaimTypeJoin
    - ActionClaimTypeCancel
    - ActionClaimTypeReveal
    - ActionClaimTypeExpiredFollowUp
  entity.ActivityQueueKey:
    enum:
    - joinable
    - my-active
    - reveal-required
    - expired-attention
    - history
    type: string
    x-enum-varnames:
    - ActivityQueueJoinable
    - ActivityQueueMyActive
    - ActivityQueueRevealRequired
    - ActivityQueueExpiredAttention
    - ActivityQueueHistory
  entity.Game:
    properties:
      bet_amount:
        description: nanotons
        type: integer
      complete_tx_hash:
        type: string
      completed_at:
        type: string
      created_at:
        type: string
      fee_receiver_address:
        type: string
      game_id:
        type: integer
      highest_bid_allowed:
        type: integer
      init_tx_hash:
        type: string
      join_tx_hash:
        type: string
      joined_at:
        type: string
      lowest_bid_allowed:
        type: integer
      min_referrer_payout_value:
        type: integer
      payout_amount:
        type: integer
      player_one_address:
        type: string
      player_one_choice:
        description: 1=CLOSED, 2=HEADS, 3=TAILS
        type: integer
      player_one_referrer:
        type: string
      player_two_address:
        type: string
      player_two_choice:
        type: integer
      player_two_referrer:
        type: string
      protocol_version:
        type: integer
      referrer_fee_numerator:
        type: integer
      reveal_tx_hash:
        type: string
      revealed_at:
        type: string
      service_fee_numerator:
        type: integer
      status:
        description: 0-4 (see constants above)
        type: integer
      waiting_timeout_seconds:
        type: integer
      winner_address:
        type: string
    type: object
  entity.PlayerActivityGame:
    properties:
      active_claims:
        items:
          $ref: '#/definitions/entity.ActionClaim'
        type: array
      game:
        $ref: '#/definitions/entity.Game'
      is_owned_by_player:
        type: boolean
      latest_activity_at:
        type: string
      next_action:
        $ref: '#/definitions/entity.PlayerActivityNextAction'
      queue_key:
        $ref: '#/definitions/entity.ActivityQueueKey'
      requires_attention:
        type: boolean
    type: object
  entity.PlayerActivityNextAction:
    enum:
    - join
    - resume_join
    - wait_for_join_window
    - resume_cancel
    - wait_for_cancel_resolution
    - wait_for_opponent
    - reveal
    - resume_reveal
    - wait_for_reveal
    - review_result
    - resume_review_result
    - wait_for_review_window
    - browse_history
    type: string
    x-enum-varnames:
    - ActivityNextActionJoin
    - ActivityNextActionResumeJoin
    - ActivityNextActionWaitForJoinWindow
    - ActivityNextActionResumeCancel
    - ActivityNextActionWaitForCancel
    - ActivityNextActionWaitForOpponent
    - ActivityNextActionReveal
    - ActivityNextActionResumeReveal
    - ActivityNextActionWaitForReveal
    - ActivityNextActionReviewResult
    - ActivityNextActionResumeReview
    - ActivityNextActionWaitForReview
    - ActivityNextActionBrowseHistory
  entity.PlayerActivitySummary:
    properties:
      expired_attention_count:
        type: integer
      history_count:
        type: integer
      joinable_count:
        type: integer
      last_activity_at:
        type: string
      my_active_count:
        type: integer
      reveal_required_count:
        type: integer
      wallet_address:
        type: string
    type: object
  entity.ReferralStats:
    properties:
      games_referred:
        description: Total games where this wallet was referrer
        type: integer
      total_referral_earnings:
        description: Total earnings in nanotons
        type: integer
      total_referrals:
        description: Total unique referrals made by this wallet
        type: integer
      wallet_address:
        type: string
    type: object
  entity.User:
    properties:
      created_at:
        type: string
      id:
        type: integer
      telegram_user_id:
        description: Nullable for blockchain-only users
        type: integer
      telegram_username:
        type: string
      total_games_played:
        type: integer
      total_losses:
        type: integer
      total_referral_earnings:
        description: nanotons
        type: integer
      total_referrals:
        type: integer
      total_wins:
        type: integer
      updated_at:
        type: string
      wallet_address:
        type: string
    type: object
  rest.CancelReservationEnvelope:
    properties:
      reservation:
        $ref: '#/definitions/rest.CancelReservationResponse'
    type: object
  rest.CancelReservationListResponse:
    properties:
      reservations:
        items:
          $ref: '#/definitions/rest.CancelReservationResponse'
        type: array
    type: object
  rest.CancelReservationResponse:
    properties:
      created_at:
        type: string
      expires_at:
        type: string
      game_id:
        type: integer
      status:
        type: string
      wallet_address:
        type: string
    type: object
  rest.CancelReserveRequest:
    properties:
      wallet_address:
        type: string
    required:
    - wallet_address
    type: object
  rest.ErrorResponse:
    properties:
      details:
        additionalProperties: true
        type: object
      error:
        type: string
      message:
        type: string
    type: object
  rest.ExpiredClaimEnvelope:
    properties:
      claim:
        $ref: '#/definitions/rest.ExpiredClaimResponse'
    type: object
  rest.ExpiredClaimRequest:
    properties:
      wallet_address:
        type: string
    required:
    - wallet_address
    type: object
  rest.ExpiredClaimResponse:
    properties:
      created_at:
        type: string
      expires_at:
        type: string
      game_id:
        type: integer
      status:
        type: string
      wallet_address:
        type: string
    type: object
  rest.GameActivityQueueResponse:
    properties:
      attention_required:
        type: boolean
      items:
        items:
          $ref: '#/definitions/entity.PlayerActivityGame'
        type: array
      limit:
        type: integer
      offset:
        type: integer
      queue_key:
        $ref: '#/definitions/entity.ActivityQueueKey'
      summary:
        $ref: '#/definitions/entity.PlayerActivitySummary'
      title:
        type: string
      total:
        type: integer
    type: object
  rest.GameActivitySearchResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/entity.PlayerActivityGame'
        type: array
      limit:
        type: integer
      message:
        type: string
      offset:
        type: integer
      query:
        type: string
      queue_scope:
        type: string
      summary:
        $ref: '#/definitions/entity.PlayerActivitySummary'
      total:
        type: integer
    type: object
  rest.GameHistoryResponse:
    properties:
      games:
        items:
          $ref: '#/definitions/entity.Game'
        type: array
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
      wallet_address:
        type: string
    type: object
  rest.GameListResponse:
    properties:
      games:
        items:
          $ref: '#/definitions/rest.GameWithReservation'
        type: array
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  rest.GameWithReservation:
    properties:
      game:
        $ref: '#/definitions/entity.Game'
      reservation:
        $ref: '#/definitions/rest.Reservation'
    type: object
  rest.HealthResponse:
    properties:
      database:
        description: PostgreSQL connectivity state.
        enum:
        - connected
        - disconnected
        - not_configured
        type: string
      event_source_status:
        description: Connectivity state for the active event source.
        enum:
        - connected
        - disconnected
        - not_configured
        type: string
      event_source_type:
        description: Active blockchain ingestion source.
        enum:
        - websocket
        - http
        - not_configured
        type: string
      parser:
        allOf:
        - $ref: '#/definitions/rest.ParserHealthResponse'
        description: Parser checkpoint and recovery snapshot.
      status:
        description: Overall service status after merging database, TON Center, and
          parser state.
        enum:
        - healthy
        - degraded
        - unhealthy
        type: string
      timestamp:
        description: Response timestamp in RFC3339 format.
        type: string
      ton_center_api:
        description: TON Center client/circuit-breaker state.
        enum:
        - connected
        - recovering
        - circuit_breaker_open
        - not_configured
        type: string
    type: object
  rest.ListReservationsResponse:
    properties:
      reservations:
        items:
          $ref: '#/definitions/rest.ReservationResponse'
        type: array
    type: object
  rest.ParserHealthResponse:
    properties:
      checkpoint_updated_at:
        description: Last persisted checkpoint update time in RFC3339 format.
        type: string
      current_source_type:
        description: Event source currently reflected by parser health.
        enum:
        - websocket
        - http
        - not_configured
        type: string
      fallback_count:
        description: Number of source fallback activations recorded in sync state.
        type: integer
      last_fallback_at:
        description: Most recent fallback activation time in RFC3339 format.
        type: string
      last_processed_lt:
        description: Most recent successfully processed TON logical time.
        type: string
      recovery_status:
        description: Recovery mode derived from live and persisted sync state.
        enum:
        - live
        - fallback_active
        - recovering
        - stalled
        - not_configured
        type: string
      status:
        description: Parser-specific health state.
        enum:
        - healthy
        - degraded
        - unhealthy
        type: string
    type: object
  rest.Reservation:
    properties:
      created_at:
        type: string
      expires_at:
        type: string
      game_id:
        type: integer
      status:
        type: string
      wallet_address:
        type: string
    type: object
  rest.ReservationResponse:
    properties:
      created_at:
        type: string
      expires_at:
        type: string
      game_id:
        type: integer
      status:
        type: string
      wallet_address:
        type: string
    type: object
  rest.ReserveGameResponse:
    properties:
      reservation:
        $ref: '#/definitions/rest.ReservationResponse'
    type: object
  rest.ReserveRequest:
    properties:
      wallet_address:
        type: string
    required:
    - wallet_address
    type: object
  rest.RevealReservationEnvelope:
    properties:
      reservation:
        $ref: '#/definitions/rest.RevealReservationResponse'
    type: object
  rest.RevealReservationListResponse:
    properties:
      reservations:
        items:
          $ref: '#/definitions/rest.RevealReservationResponse'
        type: array
    type: object
  rest.RevealReservationResponse:
    properties:
      created_at:
        type: string
      expires_at:
        type: string
      game_id:
        type: integer
      status:
        type: string
      wallet_address:
        type: string
    type: object
  rest.RevealReserveBatchRequest:
    properties:
      game_ids:
        items:
          type: integer
        minItems: 1
        type: array
      wallet_address:
        type: string
    required:
    - game_ids
    - wallet_address
    type: object
  rest.RevealReserveRequest:
    properties:
      wallet_address:
        type: string
    required:
    - wallet_address
    type: object
host: localhost:8090
info:
  contact:
    name: POD Game Team
  description: Backend service for TON blockchain gambling game with real-time WebSocket
    updates
  license:
    name: BUSL-1.1
  title: POD Game Backend API
  version: 1.0.0
paths:
  /api/v1/cancel-reservations:
    get:
      parameters:
      - description: Wallet address
        in: query
        name: wallet
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.CancelReservationListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: List active cancel reservations for a wallet
      tags:
      - cancel-reservations
  /api/v1/games:
    get:
      consumes:
      - application/json
      description: Retrieve list of games filtered by status with pagination support.
        Game payloads may include remediated factory config/protocol fields projected
        from on-chain events; reservation data is advisory and on-chain status remains
        authoritative.
      parameters:
      - default: 1
        description: Filter by game status (0-4)
        enum:
        - 0
        - 1
        - 2
        - 3
        - 4
        in: query
        name: status
        type: integer
      - default: 20
        description: Maximum number of results
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      - default: 0
        description: Number of results to skip
        in: query
        minimum: 0
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of games
          schema:
            $ref: '#/definitions/rest.GameListResponse'
        "400":
          description: Invalid request parameters
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Get available games
      tags:
      - games
  /api/v1/games/{gameId}:
    get:
      consumes:
      - application/json
      description: Retrieve detailed information for a specific game by ID, including
        projected remediated factory config/protocol fields when available. Backend
        read models are indexed views of on-chain state.
      parameters:
      - description: Game ID
        in: path
        minimum: 1
        name: gameId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Game details
          schema:
            $ref: '#/definitions/entity.Game'
        "400":
          description: Invalid game ID
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "404":
          description: Game not found
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Get game details
      tags:
      - games
  /api/v1/games/{gameId}/cancel-reservation:
    get:
      parameters:
      - description: Game ID
        in: path
        minimum: 1
        name: gameId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.CancelReservationEnvelope'
        "204":
          description: No cancel reservation exists
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Get current cancel reservation for a game
      tags:
      - cancel-reservations
  /api/v1/games/{gameId}/cancel-reserve:
    delete:
      consumes:
      - application/json
      parameters:
      - description: Game ID
        in: path
        minimum: 1
        name: gameId
        required: true
        type: integer
      - description: Cancellation request with wallet address
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rest.CancelReserveRequest'
      responses:
        "204":
          description: Cancelled
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Cancel a cancel reservation (holder-only)
      tags:
      - cancel-reservations
    post:
      consumes:
      - application/json
      description: Advisory creator-only lock that blocks conflicting join attempts
        while the creator confirms a cancel transaction.
      parameters:
      - description: Game ID
        in: path
        minimum: 1
        name: gameId
        required: true
        type: integer
      - description: Cancel reservation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rest.CancelReserveRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/rest.CancelReservationEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Reserve cancel coordination for a waiting game
      tags:
      - cancel-reservations
  /api/v1/games/{gameId}/expired-claim:
    delete:
      consumes:
      - application/json
      description: Releases the current expired-follow-up claim held by the requesting
        wallet.
      parameters:
      - description: Game ID
        in: path
        minimum: 1
        name: gameId
        required: true
        type: integer
      - description: Expired claim release request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rest.ExpiredClaimRequest'
      produces:
      - application/json
      responses:
        "204":
          description: Claim released
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Release expired-follow-up claim
      tags:
      - games
    get:
      consumes:
      - application/json
      description: Returns the current additive expired-follow-up claim for the specified
        game.
      parameters:
      - description: Game ID
        in: path
        minimum: 1
        name: gameId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.ExpiredClaimEnvelope'
        "204":
          description: No expired-follow-up claim exists
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Get expired-follow-up claim
      tags:
      - games
    post:
      consumes:
      - application/json
      description: Creates or resumes an additive expired-follow-up claim for an ended
        game that still requires attention.
      parameters:
      - description: Game ID
        in: path
        minimum: 1
        name: gameId
        required: true
        type: integer
      - description: Expired claim request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rest.ExpiredClaimRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/rest.ExpiredClaimEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Create expired-follow-up claim
      tags:
      - games
  /api/v1/games/{gameId}/reservation:
    get:
      consumes:
      - application/json
      description: Get the current reservation status for a specific game
      parameters:
      - description: Game ID
        in: path
        minimum: 1
        name: gameId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Reservation details
          schema:
            $ref: '#/definitions/rest.ReserveGameResponse'
        "204":
          description: No reservation exists for this game
        "400":
          description: Invalid game ID
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Get game reservation
      tags:
      - reservations
  /api/v1/games/{gameId}/reserve:
    delete:
      consumes:
      - application/json
      description: Cancel an existing reservation for a game. Only the reservation
        holder can cancel.
      parameters:
      - description: Game ID
        in: path
        minimum: 1
        name: gameId
        required: true
        type: integer
      - description: Cancellation request with wallet address
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rest.ReserveRequest'
      produces:
      - application/json
      responses:
        "204":
          description: Reservation cancelled
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "403":
          description: Not the reservation holder
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "404":
          description: Reservation not found
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Cancel a game reservation
      tags:
      - reservations
    post:
      consumes:
      - application/json
      description: Reserve a game for a specific wallet address to prevent other players
        from joining
      parameters:
      - description: Game ID
        in: path
        minimum: 1
        name: gameId
        required: true
        type: integer
      - description: Reservation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rest.ReserveRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Reservation created
          schema:
            $ref: '#/definitions/rest.ReserveGameResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "404":
          description: Game not found
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "409":
          description: Game already reserved or conflict
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Reserve a game
      tags:
      - reservations
  /api/v1/games/{gameId}/reveal-reservation:
    get:
      parameters:
      - description: Game ID
        in: path
        minimum: 1
        name: gameId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.RevealReservationEnvelope'
        "204":
          description: No reveal reservation exists
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Get current reveal reservation for a game
      tags:
      - reveal-reservations
  /api/v1/games/{gameId}/reveal-reserve:
    delete:
      consumes:
      - application/json
      parameters:
      - description: Game ID
        in: path
        minimum: 1
        name: gameId
        required: true
        type: integer
      - description: Cancellation request with wallet address
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rest.RevealReserveRequest'
      responses:
        "204":
          description: Cancelled
        "400":
          description: Bad Request
          schema:
