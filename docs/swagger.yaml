basePath: /
definitions:
  entity.Game:
    properties:
      bet_amount:
        description: nanotons
        type: integer
      complete_tx_hash:
        type: string
      completed_at:
        type: string
      created_at:
        type: string
      fee_receiver_address:
        type: string
      game_id:
        type: integer
      highest_bid_allowed:
        type: integer
      init_tx_hash:
        type: string
      join_tx_hash:
        type: string
      joined_at:
        type: string
      lowest_bid_allowed:
        type: integer
      payout_amount:
        type: integer
      player_one_address:
        type: string
      player_one_choice:
        description: 1=CLOSED, 2=HEADS, 3=TAILS
        type: integer
      player_one_referrer:
        type: string
      player_two_address:
        type: string
      player_two_choice:
        type: integer
      player_two_referrer:
        type: string
      referrer_fee_numerator:
        type: integer
      reveal_tx_hash:
        type: string
      revealed_at:
        type: string
      service_fee_numerator:
        type: integer
      status:
        description: 0-4 (see constants above)
        type: integer
      waiting_timeout_seconds:
        type: integer
      winner_address:
        type: string
    type: object
  entity.ReferralStats:
    properties:
      games_referred:
        description: Total games where this wallet was referrer
        type: integer
      total_referral_earnings:
        description: Total earnings in nanotons
        type: integer
      total_referrals:
        description: Total unique referrals made by this wallet
        type: integer
      wallet_address:
        type: string
    type: object
  entity.User:
    properties:
      created_at:
        type: string
      id:
        type: integer
      telegram_user_id:
        description: Nullable for blockchain-only users
        type: integer
      telegram_username:
        type: string
      total_games_played:
        type: integer
      total_losses:
        type: integer
      total_referral_earnings:
        description: nanotons
        type: integer
      total_referrals:
        type: integer
      total_wins:
        type: integer
      updated_at:
        type: string
      wallet_address:
        type: string
    type: object
  rest.ErrorResponse:
    properties:
      details:
        additionalProperties: true
        type: object
      error:
        type: string
      message:
        type: string
    type: object
  rest.GameHistoryResponse:
    properties:
      games:
        items:
          $ref: '#/definitions/entity.Game'
        type: array
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
      wallet_address:
        type: string
    type: object
  rest.GameListResponse:
    properties:
      games:
        items:
          $ref: '#/definitions/rest.GameWithReservation'
        type: array
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  rest.GameWithReservation:
    properties:
      game:
        $ref: '#/definitions/entity.Game'
      reservation:
        $ref: '#/definitions/rest.ReservationResponse'
    type: object
  rest.HealthResponse:
    properties:
      database:
        enum:
        - connected
        - disconnected
        - not_configured
        type: string
      event_source_status:
        enum:
        - connected
        - disconnected
        - not_configured
        type: string
      event_source_type:
        enum:
        - websocket
        - http
        - not_configured
        type: string
      status:
        enum:
        - healthy
        - degraded
        - unhealthy
        type: string
      timestamp:
        type: string
      ton_center_api:
        enum:
        - connected
        - recovering
        - circuit_breaker_open
        - not_configured
        type: string
    type: object
  rest.ListReservationsResponse:
    properties:
      reservations:
        items:
          $ref: '#/definitions/rest.ReservationResponse'
        type: array
    type: object
  rest.ReservationResponse:
    properties:
      created_at:
        type: string
      expires_at:
        type: string
      game_id:
        type: integer
      status:
        type: string
      wallet_address:
        type: string
    type: object
  rest.ReserveGameResponse:
    properties:
      reservation:
        $ref: '#/definitions/rest.ReservationResponse'
    type: object
  rest.ReserveRequest:
    properties:
      wallet_address:
        type: string
    required:
    - wallet_address
    type: object
host: localhost:8090
info:
  contact:
    name: POD Game Team
  description: Backend service for TON blockchain gambling game with real-time WebSocket
    updates
  license:
    name: BUSL-1.1
  title: POD Game Backend API
  version: 1.0.0
paths:
  /api/v1/games:
    get:
      consumes:
      - application/json
      description: Retrieve list of games filtered by status with pagination support
      parameters:
      - default: 1
        description: Filter by game status (0-4)
        enum:
        - 0
        - 1
        - 2
        - 3
        - 4
        in: query
        name: status
        type: integer
      - default: 20
        description: Maximum number of results
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      - default: 0
        description: Number of results to skip
        in: query
        minimum: 0
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of games
          schema:
            $ref: '#/definitions/rest.GameListResponse'
        "400":
          description: Invalid request parameters
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Get available games
      tags:
      - games
  /api/v1/games/{gameId}:
    get:
      consumes:
      - application/json
      description: Retrieve detailed information for a specific game by ID
      parameters:
      - description: Game ID
        in: path
        minimum: 1
        name: gameId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Game details
          schema:
            $ref: '#/definitions/entity.Game'
        "400":
          description: Invalid game ID
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "404":
          description: Game not found
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Get game details
      tags:
      - games
  /api/v1/games/{gameId}/reservation:
    get:
      consumes:
      - application/json
      description: Get the current reservation status for a specific game
      parameters:
      - description: Game ID
        in: path
        minimum: 1
        name: gameId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Reservation details
          schema:
            $ref: '#/definitions/rest.ReserveGameResponse'
        "204":
          description: No reservation exists for this game
        "400":
          description: Invalid game ID
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Get game reservation
      tags:
      - reservations
  /api/v1/games/{gameId}/reserve:
    delete:
      consumes:
      - application/json
      description: Cancel an existing reservation for a game. Only the reservation
        holder can cancel.
      parameters:
      - description: Game ID
        in: path
        minimum: 1
        name: gameId
        required: true
        type: integer
      - description: Cancellation request with wallet address
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rest.ReserveRequest'
      produces:
      - application/json
      responses:
        "204":
          description: Reservation cancelled
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "403":
          description: Not the reservation holder
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "404":
          description: Reservation not found
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Cancel a game reservation
      tags:
      - reservations
    post:
      consumes:
      - application/json
      description: Reserve a game for a specific wallet address to prevent other players
        from joining
      parameters:
      - description: Game ID
        in: path
        minimum: 1
        name: gameId
        required: true
        type: integer
      - description: Reservation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rest.ReserveRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Reservation created
          schema:
            $ref: '#/definitions/rest.ReserveGameResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "404":
          description: Game not found
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "409":
          description: Game already reserved or conflict
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Reserve a game
      tags:
      - reservations
  /api/v1/health:
    get:
      description: Returns service health status including database connectivity and
        event source type
      produces:
      - application/json
      responses:
        "200":
          description: Service is healthy
          schema:
            $ref: '#/definitions/rest.HealthResponse'
        "503":
          description: Service is unhealthy
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Health check endpoint
      tags:
      - health
  /api/v1/reservations:
    get:
      consumes:
      - application/json
      description: Get all active reservations for a specific wallet address
      parameters:
      - description: Wallet address
        in: query
        name: wallet
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of reservations
          schema:
            $ref: '#/definitions/rest.ListReservationsResponse'
        "400":
          description: Invalid wallet address
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: List reservations by wallet
      tags:
      - reservations
  /api/v1/users/{address}:
    get:
      consumes:
      - application/json
      description: Retrieve user profile information including statistics (total games,
        wins, losses)
      parameters:
      - description: TON wallet address (EQ...)
        example: '"EQDtFpEwcFAEcRe5mLVh2N6C0x-_hJEM7W61_JLnSF74p4q2"'
        in: path
        name: address
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: User profile with statistics
          schema:
            $ref: '#/definitions/entity.User'
        "400":
          description: Invalid wallet address format
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Get user profile
      tags:
      - users
  /api/v1/users/{address}/history:
    get:
      consumes:
      - application/json
      description: Retrieve paginated list of games where the user participated (as
        player 1 or player 2)
      parameters:
      - description: TON wallet address (EQ...)
        example: '"EQDtFpEwcFAEcRe5mLVh2N6C0x-_hJEM7W61_JLnSF74p4q2"'
        in: path
        name: address
        required: true
        type: string
      - default: 20
        description: 'Number of games to return (default: 20, max: 100)'
        in: query
        name: limit
        type: integer
      - default: 0
        description: 'Offset for pagination (default: 0)'
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Paginated game history
          schema:
            $ref: '#/definitions/rest.GameHistoryResponse'
        "400":
          description: Invalid query parameters
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Get user game history
      tags:
      - users
  /api/v1/users/{address}/referrals:
    get:
      consumes:
      - application/json
      description: Retrieve aggregated referral statistics including total referrals,
        total earnings, and games referred
      parameters:
      - description: TON wallet address (EQ...)
        example: '"EQDtFpEwcFAEcRe5mLVh2N6C0x-_hJEM7W61_JLnSF74p4q2"'
        in: path
        name: address
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Referral statistics
          schema:
            $ref: '#/definitions/entity.ReferralStats'
        "400":
          description: Invalid wallet address format
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Get referral statistics
      tags:
      - users
schemes:
- http
- https
securityDefinitions:
  TelegramAuth:
    description: Telegram Mini App authentication via initData string
    in: header
    name: X-Telegram-Init-Data
    type: apiKey
swagger: "2.0"
